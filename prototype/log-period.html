<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Log period · CycleCare AI</title><link rel="stylesheet" href="cyclecare.css"></head><body><main class="main" id="content"><header class="topbar"><a class="brand" href="cyclecare-ai.html"><span class="brand-mark">C</span>CycleCare AI</a><a href="calendar.html">Cancel</a></header><div class="page-head"><div><p class="eyebrow">New entry</p><h1>Log your period</h1><p class="muted">Record what you know. You can update this later.</p></div></div><form class="card form" onsubmit="submitLog(event,'period')" style="max-width:720px"><div class="grid grid-2"><div class="field"><label for="start">Start date</label><input id="start" type="date" value="2026-06-28" required></div><div class="field"><label for="end">End date <span class="muted">(optional)</span></label><input id="end" type="date"></div></div><div><p class="group-label">Flow level</p><div class="chips" style="margin-top:8px"><button class="chip" type="button" aria-pressed="false">Spotting</button><button class="chip" type="button" aria-pressed="false">Light</button><button class="chip" type="button" aria-pressed="true">Medium</button><button class="chip" type="button" aria-pressed="false">Heavy</button></div></div><div class="field"><label for="pain">Pain level: <output>3</output> of 5</label><input class="range" id="pain" type="range" min="0" max="5" value="3" oninput="this.previousElementSibling.querySelector('output').value=this.value"><div class="range-labels"><span>None</span><span>Severe</span></div></div><div class="field"><label for="period-notes">Notes <span class="muted">(optional)</span></label><textarea id="period-notes" placeholder="Changes in flow, clots, medication, or anything you want to remember"></textarea></div><button class="button" type="submit">Save period</button><p class="muted" style="font-size:12px">Very heavy bleeding, fainting, or severe pain may need urgent medical attention.</p></form></main><div id="toast" class="toast" role="status"></div><script src="cyclecare.js"></script></body></html>
