<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Log symptoms · CycleCare AI</title><link rel="stylesheet" href="cyclecare.css"></head><body><main class="main" id="content"><header class="topbar"><a class="brand" href="cyclecare-ai.html"><span class="brand-mark">C</span>CycleCare AI</a><a href="cyclecare-ai.html">Cancel</a></header><div class="page-head"><div><p class="eyebrow">Daily check-in</p><h1>How are you feeling?</h1><p class="muted">Choose any symptoms that apply today.</p></div></div><form class="card form" onsubmit="submitLog(event,'symptoms')" style="max-width:780px"><div><p class="group-label">Symptoms</p><div class="chips" style="margin-top:8px"><button class="chip" type="button" aria-pressed="true">Cramps</button><button class="chip" type="button" aria-pressed="false">Headache</button><button class="chip" type="button" aria-pressed="true">Back pain</button><button class="chip" type="button" aria-pressed="false">Bloating</button><button class="chip" type="button" aria-pressed="false">Breast tenderness</button><button class="chip" type="button" aria-pressed="false">Nausea</button></div></div><div class="field"><label for="severity">Overall severity: <output>3</output> of 5</label><input class="range" id="severity" type="range" min="1" max="5" value="3" oninput="this.previousElementSibling.querySelector('output').value=this.value"></div><div class="grid grid-2"><div class="field"><label for="mood">Mood</label><select id="mood"><option>Calm</option><option selected>Low</option><option>Anxious</option><option>Irritable</option><option>Positive</option></select></div><div class="field"><label for="energy">Energy</label><select id="energy"><option>High</option><option selected>Low</option><option>Very low</option></select></div><div class="field"><label for="sleep">Sleep</label><input id="sleep" type="number" min="0" max="24" step=".5" value="6.5" inputmode="decimal"></div><div class="field"><label for="stress">Stress</label><select id="stress"><option>Low</option><option selected>Moderate</option><option>High</option></select></div></div><div class="field"><label for="symptom-notes">Notes</label><textarea id="symptom-notes" placeholder="What helped, what changed, or anything else"></textarea></div><button class="button" type="submit">Save symptoms</button></form></main><div id="toast" class="toast" role="status"></div><script src="cyclecare.js"></script></body></html>
